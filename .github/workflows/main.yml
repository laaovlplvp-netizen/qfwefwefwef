name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compile
      run: cl /EHsc /D_WIN32_WINNT=0x0601 AntiDodge.cpp /Fe: AntiDodge.exe /link winhttp.lib advapi32.lib
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: AntiDodge
        path: AntiDodge.exe

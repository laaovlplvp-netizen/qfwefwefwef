name: Build AntiDodge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile AntiDodge
      run: |
        cl /O2 /EHsc /D_WIN32_WINNT=0x0601 /D WIN32_LEAN_AND_MEAN AntiDodge.cpp /Fe: AntiDodge.exe /link iphlpapi.lib ws2_32.lib winhttp.lib advapi32.lib
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AntiDodge
        path: AntiDodge.exe

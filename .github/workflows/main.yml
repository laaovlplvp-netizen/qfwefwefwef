name: Build AntiDodge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Compile AntiDodge
        run: cl /EHsc /D_WIN32_WINNT=0x0601 AntiDodge.cpp /Fe: AntiDodge.exe /link winhttp.lib advapi32.lib
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AntiDodge
          path: AntiDodge.exe
